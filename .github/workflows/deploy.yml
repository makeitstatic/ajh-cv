name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static, GitHub Pages)
        env:
          DEPLOY_TARGET: gh-pages
        run: bun run build

      - name: Locate static output
        id: find
        run: |
          if [ -d ".output/public" ]; then
            echo "dir=.output/public" >> $GITHUB_OUTPUT
          elif [ -d "dist" ]; then
            echo "dir=dist" >> $GITHUB_OUTPUT
          else
            echo "No static output found" >&2
            ls -la
            exit 1
          fi

      - name: SPA fallback (404.html) + .nojekyll
        run: |
          touch "${{ steps.find.outputs.dir }}/.nojekyll"
          if [ -f "${{ steps.find.outputs.dir }}/index.html" ]; then
            cp "${{ steps.find.outputs.dir }}/index.html" "${{ steps.find.outputs.dir }}/404.html"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
